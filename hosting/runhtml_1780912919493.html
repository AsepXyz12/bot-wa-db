<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Romantic Aesthetic</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  overflow:hidden;
  background:radial-gradient(ellipse at center,#0a0a0f 0%,#050505 100%);
  font-family:'Outfit',sans-serif;
  height:100vh;
  perspective:1200px;
}

/* GLASSMORPHISM + GLOW */
#loading{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;
  background:rgba(5,5,5,.85);
  backdrop-filter:blur(20px);
  z-index:999;
  transition:opacity 1.5s ease,filter 1.5s ease,transform 1.5s ease;
  gap:20px;
}
#loading.out{opacity:0;filter:blur(30px);transform:scale(1.1);pointer-events:none}
.loading-text{
  color:#ff6eb4;
  letter-spacing:12px;
  font-weight:200;
  font-size:14px;
  text-shadow:0 0 20px #ff6eb4,0 0 40px #ff6eb4;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}
.load-icon{
  font-size:35px;
  color:#ff6eb4;
  filter:drop-shadow(0 0 15px #ff6eb4) drop-shadow(0 0 30px #ff2d78);
  animation:loadIconPulse 1.5s ease-in-out infinite;
}
@keyframes loadIconPulse{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.2) rotate(5deg)}}
.bar{
  width:200px;
  height:2px;
  background:rgba(255,255,255,.1);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(255,110,180,.3);
}
.bar span{
  display:block;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff6eb4,#ff2d78,#d500f9);
  animation:load 4.2s forwards;
  box-shadow:0 0 15px #ff6eb4;
}
.load-dots{display:flex;gap:8px}
.load-dots span{width:4px;height:4px;border-radius:50%;background:#ff6eb4;animation:dotb 1.2s ease-in-out infinite}
.load-dots span:nth-child(2){animation-delay:.2s}
.load-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotb{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

/* SCENE */
#scene{position:fixed;inset:0;opacity:0;transition:opacity 1.5s ease;transform-style:preserve-3d}
#scene.visible{opacity:1}
#bg{
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(255,110,180,.15),transparent),
             radial-gradient(ellipse 60% 80% at 70% 60%,rgba(213,0,249,.1),transparent),
             radial-gradient(ellipse 100% 100% at 50% 50%,#050505 0%,#000 100%);
  animation:auraMove 20s ease-in-out infinite;
}
@keyframes auraMove{
 0%,100%{filter:hue-rotate(0deg) brightness(1)}
 50%{filter:hue-rotate(20deg) brightness(1.1)}
}
#vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,5,.78) 100%);pointer-events:none;z-index:5}

/* Rain text */
.text{
  position:absolute;font-weight:100;white-space:nowrap;
  animation:fall3d linear infinite;
  pointer-events:none;z-index:2;
  transition:all 1.5s ease;
  text-shadow:0 0 10px currentColor,0 0 20px currentColor;
}
@keyframes fall3d{
  from{transform:translateY(-100px) translateZ(var(--tz)) rotateY(var(--ry))}
  to{transform:translateY(115vh) translateZ(var(--tz)) rotateY(var(--ry))}
}

/* PHOTO CARD KACA + GLOW */
.photo{
  position:absolute;border-radius:20px;overflow:hidden;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.2);
  animation:fall3d linear infinite;
  z-index:3;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
.photo:hover{
  transform:scale(1.3) translateZ(50px)!important;
  border:1px solid currentColor;
  box-shadow:0 0 30px currentColor,0 0 60px currentColor;
  z-index:10;
}
.photo img{width:100%;height:100%;object-fit:cover;filter:brightness(1.05) contrast(1.05)}

/* MUSIC BTN NEON */
#musicBtn{
  position:fixed;bottom:20px;right:20px;z-index:100;
  width:42px;height:42px;border-radius:50%;
  background:rgba(5,5,5,.6);
  backdrop-filter:blur(10px);
  border:1.5px solid rgba(255,110,180,.5);
  color:#ff6eb4;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;
  box-shadow:0 0 15px rgba(255,110,180,.4),inset 0 0 10px rgba(255,110,180,.1);
  transition:all 0.3s ease;
}
#musicBtn:hover{
  transform:scale(1.15);
  box-shadow:0 0 25px rgba(255,110,180,.7),inset 0 0 15px rgba(255,110,180,.2);
  border-color:#ff6eb4;
}

/* PANEL KACA */
#musicPanel{
  position:fixed;bottom:70px;right:20px;z-index:100;
  background:rgba(10,10,15,.7);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,110,180,.3);
  border-radius:20px;
  padding:14px 16px;
  display:flex;flex-direction:column;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 20px rgba(255,110,180,.2);
  opacity:0;pointer-events:none;
  transform:translateY(10px);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  min-width:160px;
}
#musicPanel.open{opacity:1;pointer-events:all;transform:translateY(0)}
.panel-label{font-size:9px;letter-spacing:5px;color:rgba(255,255,255,.4);font-weight:200;display:flex;align-items:center;gap:6px}
.panel-label i{font-size:9px}
.panel-btns{display:flex;gap:7px;align-items:center}
.pbtn{
  width:30px;height:30px;border-radius:50%;
  border:1px solid rgba(255,110,180,.4);
  background:rgba(255,110,180,.1);
  backdrop-filter:blur(5px);
  color:#ff6eb4;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;
  transition:all 0.2s;
  box-shadow:0 0 10px rgba(255,110,180,.2);
}
.pbtn:hover{
  background:rgba(255,110,180,.25);
  box-shadow:0 0 15px rgba(255,110,180,.6);
  transform:scale(1.12);
}
.vol-row{display:flex;align-items:center;gap:6px}
.vol-row i{font-size:9px;color:rgba(255,255,255,.3)}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  flex:1;height:2px;border-radius:10px;outline:none;cursor:pointer;
  background:linear-gradient(90deg,#ff6eb4,#ff2d78);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;border-radius:50%;
  background:#fff;box-shadow:0 0 8px #ff6eb4;cursor:pointer;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="load-icon"><i class="fa-solid fa-heart"></i></div>
  <div class="loading-text">LOADING MEMORIES</div>
  <div class="bar"><span></span></div>
  <div class="load-dots"><span></span><span></span><span></span></div>
</div>

<!-- SCENE -->
<div id="scene">
  <div id="bg"></div>
  <div id="vignette"></div>
</div>

<!-- MUSIC BUTTON -->
<div id="musicBtn" title="Music"><i class="fa-solid fa-music" id="musicIcon"></i></div>

<!-- MUSIC PANEL -->
<div id="musicPanel">
  <div class="panel-label"><i class="fa-solid fa-music"></i> NOW PLAYING</div>
  <div class="panel-btns">
    <button class="pbtn" id="btnPlay"><i class="fa-solid fa-play" id="playIcon"></i></button>
    <button class="pbtn" id="btnMute"><i class="fa-solid fa-volume-high" id="muteIcon"></i></button>
    <button class="pbtn" id="btnLoop"><i class="fa-solid fa-repeat"></i></button>
  </div>
  <div class="vol-row">
    <i class="fa-solid fa-volume-low"></i>
    <input type="range" id="volSlider" min="0" max="100" value="50">
    <i class="fa-solid fa-volume-high"></i>
  </div>
</div>

<audio id="bgAudio" loop>
  <source src="https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912781430.mpeg" type="audio/mpeg">
</audio>

<script>
const MESSAGES = [
  "i love you","i miss you","thinking of u","my favorite person",
  "forever","love u more","always with you","you are enough",
  "my safe place","you mean everything","always on my mind",
  "stay with me","only you","my heart is yours"
];

// FOTO PAKE LINK ONLINE - 100% WORK
const PHOTOS = [
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912322029.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912330911.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912337371.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912399598.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912406654.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912412479.jpeg"
];

/* ── WARNA GLOBAL ── */
const COLORS = [
  "#ffffff","#ffe4ef","#ffb6d5","#ff6eb4",
  "#ff2d78","#ff1744","#00e5ff","#d500f9",
];
let currentColor = 0;

function applyGlobalColor() {
  const color = COLORS[currentColor];
  const r = parseInt(color.slice(1,3),16)||255;
  const g = parseInt(color.slice(3,5),16)||110;
  const b = parseInt(color.slice(5,7),16)||180;

  document.querySelectorAll('.text').forEach(el => {
    el.style.color = color;
  });
  document.querySelectorAll('.photo').forEach(el => {
    el.style.borderColor = color + '66';
  });
  const btn = document.getElementById('musicBtn');
  btn.style.color = color;
  btn.style.borderColor = `rgba(${r},${g},${b},.6)`;
}

setInterval(() => {
  currentColor = (currentColor + 1) % COLORS.length;
  applyGlobalColor();
}, 3000);

/* ── LOADING ── */
setTimeout(() => {
  document.getElementById('loading').classList.add('out');
  document.getElementById('scene').classList.add('visible');
  setTimeout(() => document.getElementById('loading').remove(), 1600);
  bgAudio.volume = 0.5;
  bgAudio.play().catch(() => {});
  applyGlobalColor();
}, 4400);

/* ── RAIN TEXT 40 ── */
for (let i = 0; i < 40; i++) {
  const el = document.createElement('div');
  el.className = 'text';
  el.innerText = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
  const depth = Math.random();
  const sz = 9 + depth * 18;
  el.style.cssText = `
    left:${Math.random()*105}vw;
    font-size:${sz}px;
    opacity:${0.1 + depth * 0.5};
    color:#ff6eb4;
    animation-duration:${10+Math.random()*22}s;
    animation-delay:${-Math.random()*30}s;
    --tz:${depth*200-80}px;
    --ry:${(Math.random()-.5)*28}deg;
  `;
  document.body.appendChild(el);
}

/* ── PHOTO RAIN 6 ── */
for (let i = 0; i < 6; i++) {
  const el = document.createElement('div');
  el.className = 'photo';
  const depth = Math.random();
  const sz = 70 + depth * 60;
  el.style.cssText = `
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}vw;
    opacity:${0.3+depth*0.5};
    animation-duration:${16+Math.random()*22}s;
    animation-delay:${-Math.random()*25}s;
    --tz:${depth*160-60}px;
    --ry:${(Math.random()-.5)*30}deg;
  `;
  const img = document.createElement('img');
  img.src = PHOTOS[i % PHOTOS.length];
  img.loading = 'lazy';
  el.appendChild(img);
  document.body.appendChild(el);
}

/* ── MOUSE PARALLAX ── */
let tx = 0, ty = 0;
document.addEventListener('mousemove', e => {
  tx = (e.clientX / innerWidth -.5) * 20;
  ty = (e.clientY / innerHeight -.5) * 12;
});
(function loop() {
  const sc = document.getElementById('scene');
  if (sc) sc.style.transform = `rotateY(${tx*.18}deg) rotateX(${-ty*.12}deg) translate(${tx*.4}px,${ty*.25}px)`;
  requestAnimationFrame(loop);
})();

/* ── MUSIC PANEL toggle ── */
let panelOpen = false;
const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', () => {
  panelOpen =!panelOpen;
  document.getElementById('musicPanel').classList.toggle('open', panelOpen);
  document.getElementById('musicIcon').className = panelOpen? 'fa-solid fa-xmark' : 'fa-solid fa-music';
});
document.addEventListener('click', e => {
  if (panelOpen &&!musicBtn.contains(e.target) &&!document.getElementById('musicPanel').contains(e.target)) {
    panelOpen = false;
    document.getElementById('musicPanel').classList.remove('open');
    document.getElementById('musicIcon').className = 'fa-solid fa-music';
  }
});

/* ── MUSIC CONTROLS ── */
const audio = document.getElementById('bgAudio');
let isPlaying = false, isMuted = false;

document.getElementById('btnPlay').addEventListener('click', () => {
  if (isPlaying) { audio.pause(); document.getElementById('playIcon').className = 'fa-solid fa-play'; }
  else { audio.play().catch(()=>{}); document.getElementById('playIcon').className = 'fa-solid fa-pause'; }
  isPlaying =!isPlaying;
});
document.getElementById('btnMute').addEventListener('click', () => {
  isMuted =!isMuted;
  audio.muted = isMuted;
  document.getElementById('muteIcon').className = isMuted? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
});
document.getElementById('btnLoop').addEventListener('click', function() {
  audio.loop =!audio.loop;
  this.style.opacity = audio.loop? '1' : '0.4';
});
document.getElementById('volSlider').addEventListener('input', function() {
  audio.volume = this.value / 100;
  if (audio.volume > 0 && isMuted) { isMuted = false; audio.muted = false; document.getElementById('muteIcon').className = 'fa-solid fa-volume-high'; }
});
audio.addEventListener('play', () => { isPlaying = true; document.getElementById('playIcon').className = 'fa-solid fa-pause'; });
audio.addEventListener('pause', () => { isPlaying = false; document.getElementById('playIcon').className = 'fa-solid fa-play'; });
</script>
</body>
</html>
