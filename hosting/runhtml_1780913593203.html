<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Premium Romantic Aesthetic - For You">
<title>For You ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #ff6eb4;
  --primary-dark: #ff2d78;
  --accent: #d500f9;
  --bg-dark: #030305;
  --bg-card: rgba(12, 12, 20, 0.85);
  --text-glow: 0 0 12px var(--primary), 0 0 25px var(--primary);
  --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(255, 110, 180, 0.2);
}

html, body {
  overflow: hidden;
  background: var(--bg-dark);
  font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  width: 100vw;
  perspective: 1200px;
  -webkit-font-smoothing: antialiased;
  touch-action: none;
}

/* ========== LOADING SCREEN ========== */
#loading {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: radial-gradient(circle at 50% 50%, #0a0a0f 0%, var(--bg-dark) 100%);
  z-index: 999;
  gap: 24px;
  transition: opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1),
              transform 1.4s cubic-bezier(0.4, 0, 0.2, 1),
              filter 1.4s ease;
}

#loading.out {
  opacity: 0;
  transform: scale(1.08);
  filter: blur(24px);
  pointer-events: none;
}

.loading-text {
  color: var(--primary);
  letter-spacing: 14px;
  font-weight: 200;
  font-size: 14px;
  text-shadow: var(--text-glow);
  animation: pulse 2.4s ease-in-out infinite;
}

@keyframes pulse {
 0%, 100% { opacity: 0.7; transform: scale(1); }
 50% { opacity: 1; transform: scale(1.04); }
}

.load-icon {
  font-size: 40px;
  color: var(--primary);
  filter: drop-shadow(0 0 20px var(--primary)) drop-shadow(0 0 45px var(--primary-dark));
  animation: loadIconPulse 1.8s ease-in-out infinite;
}

@keyframes loadIconPulse {
 0%, 100% { transform: scale(1) rotate(0deg); }
 50% { transform: scale(1.28) rotate(10deg); }
}

.bar {
  width: 240px;
  height: 3px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(255, 110, 180, 0.3);
}

.bar span {
  display: block;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark), var(--accent));
  animation: load 4.4s forwards;
  box-shadow: 0 0 20px var(--primary);
}

@keyframes load { to { width: 100%; } }

/* ========== SCENE & BACKGROUND ========== */
#scene {
  position: fixed;
  inset: 0;
  opacity: 0;
  transition: opacity 1.4s ease;
  transform-style: preserve-3d;
  will-change: transform;
}

#scene.visible { opacity: 1; }

#bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 85% 65% at 30% 40%, rgba(255, 110, 180, 0.2), transparent 65%),
    radial-gradient(ellipse 65% 85% at 70% 60%, rgba(213, 0, 249, 0.15), transparent 65%),
    radial-gradient(circle at 50% 50%, var(--bg-dark) 0%, #000 100%);
  animation: auraMove 35s ease-in-out infinite;
}

@keyframes auraMove {
 0%, 100% { filter: hue-rotate(0deg) brightness(1); }
 50% { filter: hue-rotate(30deg) brightness(1.18); }
}

#vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.88) 100%);
  pointer-events: none;
  z-index: 5;
}

/* ========== TEXT RAIN - NO OVERFLOW ========== */
.text {
  position: absolute;
  font-weight: 100;
  white-space: nowrap;
  animation: fall3d linear infinite;
  pointer-events: none;
  z-index: 2;
  text-shadow: 0 0 10px currentColor, 0 0 22px currentColor;
  will-change: transform, opacity;
  max-width: 90vw; /* ANTI TUMPAH */
  overflow: hidden;
  text-overflow: ellipsis;
}

@keyframes fall3d {
  from { transform: translate3d(0, -150px, var(--tz)) rotateY(var(--ry)); }
  to { transform: translate3d(0, 120vh, var(--tz)) rotateY(var(--ry)); }
}

/* ========== PHOTO COLUMN - RANDOM INSIDE LANE ========== */
.photo {
  position: absolute;
  border-radius: 24px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.05);
  border: 1.5px solid rgba(255, 255, 255, 0.18);
  animation: fall3d linear infinite;
  z-index: 3;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--card-shadow);
  will-change: transform, opacity;
}

.photo:hover {
  transform: scale(1.38) translateZ(70px)!important;
  border: 1.5px solid currentColor;
  box-shadow: 0 0 45px currentColor, 0 0 90px currentColor;
  z-index: 10;
}

.photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(1.1) contrast(1.06) saturate(1.12);
}

/* ========== MUSIC CONTROLS ========== */
#musicBtn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 100;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(15, 15, 25, 0.9), rgba(5, 5, 10, 0.9));
  border: 2px solid rgba(255, 110, 180, 0.65);
  color: var(--primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  box-shadow: 0 0 22px rgba(255, 110, 180, 0.55), inset 0 0 18px rgba(255, 110, 180, 0.18);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

#musicBtn:hover {
  transform: scale(1.2) rotate(12deg);
  box-shadow: 0 0 38px rgba(255, 110, 180, 0.85), inset 0 0 25px rgba(255, 110, 180, 0.3);
  border-color: var(--primary);
}

#musicPanel {
  position: fixed;
  bottom: 80px;
  right: 24px;
  z-index: 100;
  background: linear-gradient(135deg, rgba(12, 12, 20, 0.96), rgba(5, 5, 10, 0.96));
  border: 1.5px solid rgba(255, 110, 180, 0.45);
  border-radius: 24px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 18px 55px rgba(0, 0, 0, 0.65), 0 0 35px rgba(255, 110, 180, 0.28);
  opacity: 0;
  pointer-events: none;
  transform: translateY(14px) scale(0.93);
  transition: all 0.38s cubic-bezier(0.4, 0, 0.2, 1);
  min-width: 180px;
  backdrop-filter: blur(10px);
}

#musicPanel.open {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0) scale(1);
}

.panel-label {
  font-size: 10px;
  letter-spacing: 6px;
  color: rgba(255, 255, 255, 0.48);
  font-weight: 200;
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-btns { display: flex; gap: 10px; }

.pbtn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1.5px solid rgba(255, 110, 180, 0.55);
  background: linear-gradient(135deg, rgba(255, 110, 180, 0.14), rgba(255, 45, 120, 0.1));
  color: var(--primary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 14px rgba(255, 110, 180, 0.28);
}

.pbtn:hover {
  background: linear-gradient(135deg, rgba(255, 110, 180, 0.32), rgba(255, 45, 120, 0.22));
  box-shadow: 0 0 22px rgba(255, 110, 180, 0.75);
  transform: scale(1.16);
}

.vol-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 3px;
  border-radius: 10px;
  outline: none;
  cursor: pointer;
  background: linear-gradient(90deg, var(--primary), var(--primary-dark), var(--accent));
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 0 12px var(--primary);
  border: 2px solid var(--primary);
  cursor: pointer;
}

/* ========== RESPONSIVE ========== */
@media (max-width: 480px) {
 .bar { width: 200px; }
  #musicBtn { width: 42px; height: 42px; bottom: 20px; right: 20px; }
  #musicPanel { bottom: 72px; right: 20px; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="load-icon"><i class="fa-solid fa-heart"></i></div>
  <div class="loading-text">LOADING MEMORIES</div>
  <div class="bar"><span></span></div>
</div>

<!-- SCENE -->
<div id="scene">
  <div id="bg"></div>
  <div id="vignette"></div>
</div>

<!-- MUSIC CONTROLS -->
<div id="musicBtn" title="Music Player">
  <i class="fa-solid fa-music" id="musicIcon"></i>
</div>

<div id="musicPanel">
  <div class="panel-label"><i class="fa-solid fa-music"></i> NOW PLAYING</div>
  <div class="panel-btns">
    <button class="pbtn" id="btnPlay" aria-label="Play/Pause">
      <i class="fa-solid fa-play" id="playIcon"></i>
    </button>
    <button class="pbtn" id="btnMute" aria-label="Mute">
      <i class="fa-solid fa-volume-high" id="muteIcon"></i>
    </button>
    <button class="pbtn" id="btnLoop" aria-label="Loop">
      <i class="fa-solid fa-repeat"></i>
    </button>
  </div>
  <div class="vol-row">
    <i class="fa-solid fa-volume-low" style="font-size: 9px; color: rgba(255,255,255,0.35)"></i>
    <input type="range" id="volSlider" min="0" max="100" value="55" aria-label="Volume">
    <i class="fa-solid fa-volume-high" style="font-size: 9px; color: rgba(255,255,255,0.35)"></i>
  </div>
</div>

<audio id="bgAudio" loop preload="auto">
  <source src="https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912781430.mpeg" type="audio/mpeg">
</audio>

<script>
// ========== DATA ==========
const MESSAGES = [
  "i love you", "i miss you", "thinking of u", "my favorite person",
  "forever", "love u more", "always with you", "you are enough",
  "my safe place", "you mean everything", "always on my mind",
  "stay with me", "only you", "my heart is yours", "cantik banget",
  "kangen", "senyum dong", "you're my home"
];

const PHOTOS = [
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912322029.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912330911.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912337371.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912399598.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912406654.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912412479.jpeg"
];

const COLORS = ["#ffffff", "#ffe4ef", "#ffb6d5", "#ff6eb4", "#ff2d78", "#ff1744", "#00e5ff", "#d500f9"];
let currentColor = 0;

// ========== COLOR SYSTEM ==========
function applyGlobalColor() {
  const color = COLORS[currentColor];
  const r = parseInt(color.slice(1, 3), 16) || 255;
  const g = parseInt(color.slice(3, 5), 16) || 110;
  const b = parseInt(color.slice(5, 7), 16) || 180;

  document.querySelectorAll('.text').forEach(el => el.style.color = color);
  document.querySelectorAll('.photo').forEach(el => el.style.borderColor = color + 'aa');

  const btn = document.getElementById('musicBtn');
  btn.style.color = color;
  btn.style.borderColor = `rgba(${r}, ${g}, ${b}, 0.85)`;

  document.documentElement.style.setProperty('--primary', color);
}

setInterval(() => {
  currentColor = (currentColor + 1) % COLORS.length;
  applyGlobalColor();
}, 3300);

// ========== LOADING SEQUENCE ==========
setTimeout(() => {
  document.getElementById('loading').classList.add('out');
  document.getElementById('scene').classList.add('visible');
  setTimeout(() => document.getElementById('loading').remove(), 1400);

  const audio = document.getElementById('bgAudio');
  audio.volume = 0.55;
  audio.play().catch(() => console.log('Audio autoplay blocked - click play button'));
  applyGlobalColor();
}, 4200);

// ========== TEXT RAIN - NO OVERFLOW ==========
for (let i = 0; i < 28; i++) {
  const el = document.createElement('div');
  el.className = 'text';
  el.innerText = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];

  const depth = Math.random();
  const sz = 12 + depth * 16;

  // ANTI TUMPAH: batasi left 5% - 95%
  const safeLeft = 5 + Math.random() * 90;

  el.style.cssText = `
    left: ${safeLeft}vw;
    font-size: ${sz}px;
    opacity: ${0.2 + depth * 0.45};
    color: var(--primary);
    animation-duration: ${14 + Math.random() * 18}s;
    animation-delay: ${-Math.random() * 30}s;
    --tz: ${depth * 180 - 60}px;
    --ry: ${(Math.random() - 0.5) * 22}deg;
  `;
  document.body.appendChild(el);
}

// ========== PHOTO RAIN - RANDOM INSIDE 380PX LANE ==========
const COLUMN_WIDTH = 380;
const getColumnLeft = () => (window.innerWidth - COLUMN_WIDTH) / 2;

function createPhotoRain() {
  const columnLeft = getColumnLeft();

  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'photo';
    const depth = Math.random();
    const sz = 80 + depth * 40;

    // Random di dalem kolom tengah
    const randomLeft = columnLeft + Math.random() * (COLUMN_WIDTH - sz);

    el.style.cssText = `
      width: ${sz}px;
      height: ${sz}px;
      left: ${randomLeft}px;
      opacity: ${0.42 + depth * 0.43};
      animation-duration: ${19 + Math.random() * 14}s;
      animation-delay: ${-i * 3.2 - Math.random() * 7}s;
      --tz: ${depth * 150 - 50}px;
      --ry: ${(Math.random() - 0.5) * 18}deg;
    `;

    const img = document.createElement('img');
    img.src = PHOTOS[i % PHOTOS.length];
    img.loading = 'lazy';
    img.decoding = 'async';
    img.onerror = () => el.style.border = '2px solid red';
    el.appendChild(img);
    document.body.appendChild(el);
  }
}

createPhotoRain();

// Update posisi kolom saat resize
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    const newColumnLeft = getColumnLeft();
    document.querySelectorAll('.photo').forEach(photo => {
      const width = parseFloat(photo.style.width);
      const maxLeft = newColumnLeft + (COLUMN_WIDTH - width);
      const currentLeft = parseFloat(photo.style.left);
      photo.style.left = Math.max(newColumnLeft, Math.min(currentLeft, maxLeft)) + 'px';
    });
  }, 250);
});

// ========== PARALLAX SMOOTH ==========
let tx = 0, ty = 0, lastMove = 0;
document.addEventListener('mousemove', e => {
  const now = Date.now();
  if (now - lastMove < 16) return;
  lastMove = now;
  tx = (e.clientX / window.innerWidth - 0.5) * 18;
  ty = (e.clientY / window.innerHeight - 0.5) * 10;
});

(function loop() {
  const sc = document.getElementById('scene');
  if (sc) {
    sc.style.transform = `rotateY(${tx * 0.15}deg) rotateX(${-ty * 0.1}deg) translate3d(${tx * 0.35}px, ${ty * 0.22}px, 0)`;
  }
  requestAnimationFrame(loop);
})();

// ========== MUSIC CONTROLS ==========
let panelOpen = false;
const musicBtn = document.getElementById('musicBtn');
const audio = document.getElementById('bgAudio');
let isPlaying = false, isMuted = false;

musicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  panelOpen =!panelOpen;
  document.getElementById('musicPanel').classList.toggle('open', panelOpen);
  document.getElementById('musicIcon').className = panelOpen? 'fa-solid fa-xmark' : 'fa-solid fa-music';
});

document.addEventListener('click', e => {
  if (panelOpen &&!musicBtn.contains(e.target) &&!document.getElementById('musicPanel').contains(e.target)) {
    panelOpen = false;
    document.getElementById('musicPanel').classList.remove('open');
    document.getElementById('musicIcon').className = 'fa-solid fa-music';
  }
});

document.getElementById('btnPlay').addEventListener('click', () => {
  if (isPlaying) {
    audio.pause();
    document.getElementById('playIcon').className = 'fa-solid fa-play';
  } else {
    audio.play().catch(() => {});
    document.getElementById('playIcon').className = 'fa-solid fa-pause';
  }
  isPlaying =!isPlaying;
});

document.getElementById('btnMute').addEventListener('click', () => {
  isMuted =!isMuted;
  audio.muted = isMuted;
  document.getElementById('muteIcon').className = isMuted? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
});

document.getElementById('btnLoop').addEventListener('click', function() {
  audio.loop =!audio.loop;
  this.style.opacity = audio.loop? '1' : '0.4';
});

document.getElementById('volSlider').addEventListener('input', function() {
  audio.volume = this.value / 100;
  if (audio.volume > 0 && isMuted) {
    isMuted = false;
    audio.muted = false;
    document.getElementById('muteIcon').className = 'fa-solid fa-volume-high';
  }
});

audio.addEventListener('play', () => {
  isPlaying = true;
  document.getElementById('playIcon').className = 'fa-solid fa-pause';
});

audio.addEventListener('pause', () => {
  isPlaying = false;
  document.getElementById('playIcon').className = 'fa-solid fa-play';
});
</script>
</body>
</html>
