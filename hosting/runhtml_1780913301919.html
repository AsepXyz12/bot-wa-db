<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Premium Romantic Aesthetic</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  overflow:hidden;
  background:#030305;
  font-family:'Outfit',sans-serif;
  height:100vh;
  perspective:1200px;
}

/* LOADING PREMIUM */
#loading{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;background:radial-gradient(circle,#0a0a0f 0%,#030305 100%);
  z-index:999;gap:22px;
  transition:opacity 1.3s ease,transform 1.3s ease,filter 1.3s ease;
}
#loading.out{opacity:0;transform:scale(1.08);filter:blur(20px);pointer-events:none}
.loading-text{
  color:#ff6eb4;letter-spacing:14px;font-weight:200;font-size:14px;
  text-shadow:0 0 25px #ff6eb4,0 0 50px #ff2d78;
  animation:pulse 2.2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.03)}}
.load-icon{
  font-size:38px;color:#ff6eb4;
  filter:drop-shadow(0 0 20px #ff6eb4) drop-shadow(0 0 40px #ff2d78);
  animation:loadIconPulse 1.6s ease-in-out infinite;
}
@keyframes loadIconPulse{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.25) rotate(8deg)}}
.bar{
  width:220px;height:3px;background:rgba(255,255,255,.08);
  border-radius:10px;overflow:hidden;
  box-shadow:0 0 15px rgba(255,110,180,.3);
}
.bar span{
  display:block;height:100%;width:0%;
  background:linear-gradient(90deg,#ff6eb4,#ff2d78,#d500f9);
  animation:load 4.2s forwards;
  box-shadow:0 0 20px #ff6eb4;
}
@keyframes load{to{width:100%}}

/* SCENE */
#scene{position:fixed;inset:0;opacity:0;transition:opacity 1.3s ease;transform-style:preserve-3d}
#scene.visible{opacity:1}
#bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(255,110,180,.18),transparent 60%),
             radial-gradient(ellipse 60% 80% at 70% 60%,rgba(213,0,249,.12),transparent 60%),
             radial-gradient(circle at 50% 50%,#030305 0%,#000 100%);
  animation:auraMove 30s ease-in-out infinite;
}
@keyframes auraMove{
 0%,100%{filter:hue-rotate(0deg) brightness(1)}
 50%{filter:hue-rotate(25deg) brightness(1.15)}
}
#vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.85) 100%);pointer-events:none;z-index:5}

/* TEKS JATUH */
.text{
  position:absolute;font-weight:100;white-space:nowrap;
  animation:fall3d linear infinite;
  pointer-events:none;z-index:2;
  text-shadow:0 0 12px currentColor,0 0 25px currentColor;
  will-change:transform,opacity;
}
@keyframes fall3d{
  from{transform:translate3d(0,-120px,var(--tz)) rotateY(var(--ry))}
  to{transform:translate3d(0,120vh,var(--tz)) rotateY(var(--ry))}
}

/* FOTO KOLOM TENGAH - INI KUNCINYA */
.photo{
  position:absolute;
  left:50%; /* KUNCI 1: taruh di tengah */
  transform:translateX(-50%); /* KUNCI 2: geser ke kiri setengah lebar */
  border-radius:22px;overflow:hidden;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.18);
  animation:fall3dColumn linear infinite; /* animasi khusus kolom */
  z-index:3;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 10px 40px rgba(0,0,0,.5);
  will-change:transform,opacity;
}
.photo:hover{
  transform:translateX(-50%) scale(1.35) translateZ(60px)!important;
  border:1.5px solid currentColor;
  box-shadow:0 0 40px currentColor,0 0 80px currentColor;
  z-index:10;
}
.photo img{width:100%;height:100%;object-fit:cover;filter:brightness(1.08) contrast(1.05) saturate(1.1)}

/* Animasi khusus kolom tengah */
@keyframes fall3dColumn{
  from{transform:translateX(-50%) translateY(-150px) translateZ(var(--tz)) rotateY(var(--ry))}
  to{transform:translateX(-50%) translateY(120vh) translateZ(var(--tz)) rotateY(var(--ry))}
}

/* MUSIC BTN NEON PREMIUM */
#musicBtn{
  position:fixed;bottom:22px;right:22px;z-index:100;
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,rgba(15,15,25,.9),rgba(5,5,10,.9));
  border:2px solid rgba(255,110,180,.6);
  color:#ff6eb4;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  box-shadow:0 0 20px rgba(255,110,180,.5),inset 0 0 15px rgba(255,110,180,.15);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
#musicBtn:hover{
  transform:scale(1.18) rotate(10deg);
  box-shadow:0 0 35px rgba(255,110,180,.8),inset 0 0 20px rgba(255,110,180,.25);
  border-color:#ff6eb4;
}

/* MUSIC PANEL PREMIUM */
#musicPanel{
  position:fixed;bottom:75px;right:22px;z-index:100;
  background:linear-gradient(135deg,rgba(12,12,20,.95),rgba(5,5,10,.95));
  border:1.5px solid rgba(255,110,180,.4);
  border-radius:22px;
  padding:16px 18px;
  display:flex;flex-direction:column;gap:12px;
  box-shadow:0 15px 50px rgba(0,0,0,.6),0 0 30px rgba(255,110,180,.25);
  opacity:0;pointer-events:none;
  transform:translateY(12px) scale(0.95);
  transition:all 0.35s cubic-bezier(0.4,0,0.2,1);
  min-width:170px;
}
#musicPanel.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
.panel-label{
  font-size:10px;letter-spacing:6px;color:rgba(255,255,255,.45);
  font-weight:200;display:flex;align-items:center;gap:8px
}
.pbtn{
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid rgba(255,110,180,.5);
  background:linear-gradient(135deg,rgba(255,110,180,.12),rgba(255,45,120,.08));
  color:#ff6eb4;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all 0.25s;
  box-shadow:0 0 12px rgba(255,110,180,.25);
}
.pbtn:hover{
  background:linear-gradient(135deg,rgba(255,110,180,.3),rgba(255,45,120,.2));
  box-shadow:0 0 20px rgba(255,110,180,.7);
  transform:scale(1.15);
}
.vol-row{display:flex;align-items:center;gap:8px}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  flex:1;height:3px;border-radius:10px;outline:none;cursor:pointer;
  background:linear-gradient(90deg,#ff6eb4,#ff2d78,#d500f9);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:11px;height:11px;border-radius:50%;
  background:#fff;box-shadow:0 0 10px #ff6eb4;border:2px solid #ff6eb4;
}
</style>
</head>
<body>

<div id="loading">
  <div class="load-icon"><i class="fa-solid fa-heart"></i></div>
  <div class="loading-text">LOADING MEMORIES</div>
  <div class="bar"><span></span></div>
</div>

<div id="scene">
  <div id="bg"></div>
  <div id="vignette"></div>
</div>

<div id="musicBtn" title="Music"><i class="fa-solid fa-music" id="musicIcon"></i></div>

<div id="musicPanel">
  <div class="panel-label"><i class="fa-solid fa-music"></i> NOW PLAYING</div>
  <div class="panel-btns" style="display:flex;gap:8px">
    <button class="pbtn" id="btnPlay"><i class="fa-solid fa-play" id="playIcon"></i></button>
    <button class="pbtn" id="btnMute"><i class="fa-solid fa-volume-high" id="muteIcon"></i></button>
    <button class="pbtn" id="btnLoop"><i class="fa-solid fa-repeat"></i></button>
  </div>
  <div class="vol-row">
    <i class="fa-solid fa-volume-low" style="font-size:9px;color:rgba(255,255,255,.3)"></i>
    <input type="range" id="volSlider" min="0" max="100" value="50">
    <i class="fa-solid fa-volume-high" style="font-size:9px;color:rgba(255,255,255,.3)"></i>
  </div>
</div>

<audio id="bgAudio" loop preload="auto">
  <source src="https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912781430.mpeg" type="audio/mpeg">
</audio>

<script>
const MESSAGES = [
  "i love you","i miss you","thinking of u","my favorite person",
  "forever","love u more","always with you","you are enough",
  "my safe place","you mean everything","always on my mind",
  "stay with me","only you","my heart is yours"
];

const PHOTOS = [
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912322029.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912330911.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912337371.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912399598.jpeg",
  "https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1780912406654.jpeg"
];

const COLORS = ["#ffffff","#ffe4ef","#ffb6d5","#ff6eb4","#ff2d78","#ff1744","#00e5ff","#d500f9"];
let currentColor = 0;

function applyGlobalColor() {
  const color = COLORS[currentColor];
  const r = parseInt(color.slice(1,3),16)||255;
  const g = parseInt(color.slice(3,5),16)||110;
  const b = parseInt(color.slice(5,7),16)||180;

  document.querySelectorAll('.text').forEach(el => el.style.color = color);
  document.querySelectorAll('.photo').forEach(el => el.style.borderColor = color + '99');
  const btn = document.getElementById('musicBtn');
  btn.style.color = color;
  btn.style.borderColor = `rgba(${r},${g},${b},.8)`;
}

setInterval(() => {
  currentColor = (currentColor + 1) % COLORS.length;
  applyGlobalColor();
}, 3200);

// LOADING
setTimeout(() => {
  document.getElementById('loading').classList.add('out');
  document.getElementById('scene').classList.add('visible');
  setTimeout(() => document.getElementById('loading').remove(), 1300);
  const audio = document.getElementById('bgAudio');
  audio.volume = 0.55;
  audio.play().catch(() => console.log('Audio autoplay blocked'));
  applyGlobalColor();
}, 4200);

// TEKS 30 BUAH
for (let i = 0; i < 30; i++) {
  const el = document.createElement('div');
  el.className = 'text';
  el.innerText = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
  const depth = Math.random();
  const sz = 11 + depth * 17;
  el.style.cssText = `
    left:${Math.random()*100}vw;
    font-size:${sz}px;
    opacity:${0.18 + depth * 0.45};
    color:#ff6eb4;
    animation-duration:${13+Math.random()*19}s;
    animation-delay:${-Math.random()*28}s;
    --tz:${depth*180-60}px;
    --ry:${(Math.random()-.5)*25}deg;
  `;
  document.body.appendChild(el);
}

// FOTO KOLOM TENGAH 5 BUAH - RAPI TURUN
for (let i = 0; i < 5; i++) {
  const el = document.createElement('div');
  el.className = 'photo';
  const depth = Math.random();
  const sz = 85 + depth * 45;
  // KUNCI: left 50% + delay beda biar gak barengan
  el.style.cssText = `
    width:${sz}px;height:${sz}px;
    left:50%;
    opacity:${0.4+depth*0.45};
    animation-duration:${20+Math.random()*12}s;
    animation-delay:${-i*4 - Math.random()*8}s; /* delay berurutan */
    --tz:${depth*140-45}px;
    --ry:${(Math.random()-.5)*15}deg;
  `;
  const img = document.createElement('img');
  img.src = PHOTOS[i % PHOTOS.length];
  img.loading = 'lazy';
  img.decoding = 'async';
  img.onerror = () => el.style.border = '2px solid red'; // debug kalo foto error
  el.appendChild(img);
  document.body.appendChild(el);
}

// PARALLAX HALUS
let tx = 0, ty = 0;
document.addEventListener('mousemove', e => {
  tx = (e.clientX / innerWidth -.5) * 18;
  ty = (e.clientY / innerHeight -.5) * 10;
});
(function loop() {
  const sc = document.getElementById('scene');
  if (sc) sc.style.transform = `rotateY(${tx*.15}deg) rotateX(${-ty*.1}deg) translate3d(${tx*.35}px,${ty*.22}px,0)`;
  requestAnimationFrame(loop);
})();

// MUSIC CONTROLS FIX
let panelOpen = false;
const musicBtn = document.getElementById('musicBtn');
const audio = document.getElementById('bgAudio');
let isPlaying = false, isMuted = false;

musicBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  panelOpen =!panelOpen;
  document.getElementById('musicPanel').classList.toggle('open', panelOpen);
  document.getElementById('musicIcon').className = panelOpen? 'fa-solid fa-xmark' : 'fa-solid fa-music';
});

document.addEventListener('click', e => {
  if (panelOpen &&!musicBtn.contains(e.target) &&!document.getElementById('musicPanel').contains(e.target)) {
    panelOpen = false;
    document.getElementById('musicPanel').classList.remove('open');
    document.getElementById('musicIcon').className = 'fa-solid fa-music';
  }
});

document.getElementById('btnPlay').addEventListener('click', () => {
  if (isPlaying) { audio.pause(); document.getElementById('playIcon').className = 'fa-solid fa-play'; }
  else { audio.play().catch(()=>{}); document.getElementById('playIcon').className = 'fa-solid fa-pause'; }
  isPlaying =!isPlaying;
});

document.getElementById('btnMute').addEventListener('click', () => {
  isMuted =!isMuted;
  audio.muted = isMuted;
  document.getElementById('muteIcon').className = isMuted? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
});

document.getElementById('btnLoop').addEventListener('click', function() {
  audio.loop =!audio.loop;
  this.style.opacity = audio.loop? '1' : '0.4';
});

document.getElementById('volSlider').addEventListener('input', function() {
  audio.volume = this.value / 100;
  if (audio.volume > 0 && isMuted) { isMuted = false; audio.muted = false; document.getElementById('muteIcon').className = 'fa-solid fa-volume-high'; }
});

audio.addEventListener('play', () => { isPlaying = true; document.getElementById('playIcon').className = 'fa-solid fa-pause'; });
audio.addEventListener('pause', () => { isPlaying = false; document.getElementById('playIcon').className = 'fa-solid fa-play'; });
</script>
</body>
</html>
