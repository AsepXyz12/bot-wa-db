<!DOCTYPE html>

// Fungsi untuk mengubah string teks biasa menjadi format Obfuscated Hex (\xHH)
function convertToHexMangling(text) {
    let hexResult = '';
    for (let i = 0; i < text.length; i++) {
        hexResult += '\\x' + text.charCodeAt(i).toString(16).padStart(2, '0');
    }
    return hexResult;
}

            const finalProtectedCode = `/* Protected by AsepXyz VM V1 Engine */

    // Layer 7: Anti Anti-Beautify (Jika kode diformat/direnggangkan, program akan crash)
    var _0xvalidateFormat = function() {
        var _0xregex = new RegExp('\\x20\\x2a\\x2f\\x2a\\x20');
        if (!_0xregex.test(function(){}.toString())) {

    try {
        var _0xdecodedBase64 = atob(_0xaxString);
        
        // Verifikasi Nilai Kode (Integrity Check)
        var _0xcurrentSum = 0;
        for (var i = 0; i < _0xdecodedBase64.length; i++) {
            _0xcurrentSum += _0xdecodedBase64.charCodeAt(i);

            logBox.value += "[✓] Menyusun struktur akhir file...\n";

            // PROSES UNDUH OTOMATIS
            const blob = new Blob([finalProtectedCode], { type: "application/javascript" });
            const url = URL.createObjectURL(blob);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = url;
            
            // Memberikan nama file baru dengan imbuhan .protected.js
            const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            downloadAnchor.download = originalName + ".protected.js";
            
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            
            // Bersihkan memori dan element
            document.body.removeChild(downloadAnchor);
            URL.revokeObjectURL(url);

            status.innerText = "Status: Sukses! File telah terunduh.";
            logBox.value += "[+] Selesai! File pelindung berhasil diunduh.";

        } catch (err) {
            status.innerText = "Status: Eror saat memproses.";
            logBox.value += "[X] Terjadi kesalahan: " + err.message + "\n";
