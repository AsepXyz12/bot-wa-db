<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AsepXxnx - Full Stack Developer Portofolio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0d1117; font-family:monospace; color:#c9d1d9; }
.terminal { background:#010409; border-radius:10px; padding:20px; height:400px; overflow:auto; }
.typing-cursor { display:inline-block; width:8px; height:16px; background:#7ee787; animation:blink .7s infinite; }
@keyframes blink { 50%{opacity:0;} }
.progress { height:6px; background:#30363d; border-radius:10px; overflow:hidden; }
.progress-bar { height:100%; width:0%; background:linear-gradient(90deg,#d2a8ff,#79c0ff); transition:.3s; }
button { background:#79c0ff; color:#000; padding:8px 14px; border-radius:6px; }
input { background:#161b22; border:1px solid #30363d; padding:6px; color:#fff; }
</style>
</head>

<body>

<h1 style="text-align:center;margin-top:20px;">ASEPXXNX DEV TERMINAL</h1>

<div class="terminal" id="terminal"></div>

<br>

<div style="max-width:600px;margin:auto;">
<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>
<p id="percent">0%</p>
</div>

<br>

<div style="max-width:600px;margin:auto;">
<h3>AI Assistant</h3>
<div id="chat" style="background:#161b22;height:200px;overflow:auto;padding:10px;border-radius:6px;"></div>
<br>
<input id="aiInput" placeholder="ketik: button menu / auto reply / yt dl"/>
<button onclick="sendAI()">Send</button>
</div>

<script>
/* =============================
   TERMINAL 10000 LINE GENERATOR
============================= */

const terminal = document.getElementById("terminal");

let lines = [];
for(let i=1;i<=10000;i++){
  lines.push("Line "+i+" - AsepXxnx JS Engine Running...");
}

let lineIndex = 0;
let charIndex = 0;

function type() {
  if(lineIndex >= lines.length) return;

  let current = lines[lineIndex];

  if(charIndex < current.length){
    terminal.innerHTML += current[charIndex];
    charIndex++;
    setTimeout(type,1);
  } else {
    terminal.innerHTML += "<br>";
    charIndex = 0;
    lineIndex++;
    terminal.scrollTop = terminal.scrollHeight;
    setTimeout(type,1);
  }
}

type();

/* =============================
   LOADING PROGRESS
============================= */

let percent = 0;
let bar = document.getElementById("bar");
let percentText = document.getElementById("percent");

let loader = setInterval(()=>{
  if(percent >= 100){
    clearInterval(loader);
    percentText.innerText = "Build Complete ✓";
    return;
  }
  percent++;
  bar.style.width = percent+"%";
  percentText.innerText = percent+"%";
},30);

/* =============================
   MUSIC PLAYER AUTO
============================= */

let audio = new Audio("https://raw.githubusercontent.com/AsepXyz12/bot-wa-db/main/uploads/1778866009651.mpeg");
audio.loop = true;
document.addEventListener("click",()=>{
  audio.play().catch(()=>{});
},{once:true});

/* =============================
   SIMPLE AI SYSTEM
============================= */

const chat = document.getElementById("chat");

function sendAI(){
  let input = document.getElementById("aiInput").value.toLowerCase();
  if(!input) return;

  chat.innerHTML += "<p><b>You:</b> "+input+"</p>";

  let reply = "Gak ngerti command.";

  if(input.includes("button")){
    reply = "Contoh Button Menu:\n\nsock.sendMessage(jid,{ buttons:[{buttonId:'id1',buttonText:{displayText:'Klik'},type:1}], text:'Menu', footer:'AsepXxnx', headerType:1 });";
  }
  if(input.includes("auto")){
    reply = "Auto Reply Example:\n\nsock.ev.on('messages.upsert', async m => { if(m.messages[0].message.conversation==='hi'){ await sock.sendMessage(m.messages[0].key.remoteJid,{text:'Hello'}); }});";
  }
  if(input.includes("yt")){
    reply = "YouTube Downloader gunakan ytdl-core npm.";
  }

  chat.innerHTML += "<p><b>AI:</b> "+reply+"</p><hr>";
  chat.scrollTop = chat.scrollHeight;

  document.getElementById("aiInput").value="";
}
</script>

</body>
</html>
