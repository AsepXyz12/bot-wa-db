<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>難読化装置AsepXyz - Professional Transformer</title>
    <style>
        :root {
            --bg-main: #060814;
            --bg-card: #0b1120;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent: #4f46e5;
            --accent-hover: #4338ca;
            --success: #059669;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            padding: 2rem 1rem;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        header { margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; }
        h1 { color: #818cf8; font-size: 1.6rem; display: flex; align-items: center; gap: 0.5rem; }
        p { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.25rem; }
        .toolbar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .btn {
            background-color: var(--accent); color: white; border: none; padding: 0.6rem 1.2rem;
            border-radius: 0.375rem; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;
        }
        .btn:hover { background-color: var(--accent-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #047857; }
        .btn-file { background-color: #334155; }
        .btn-file:hover { background-color: #475569; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        input[type="file"] { display: none; }
        .workspace { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        @media (min-width: 768px) { .workspace { grid-template-columns: 1fr 1fr; } }
        .editor-box { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 0.5rem; overflow: hidden; display: flex; flex-direction: column; }
        .editor-label { background-color: #1e293b; padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: bold; color: #94a3b8; letter-spacing: 0.05em; }
        textarea {
            width: 100%; height: 480px; background: transparent; border: none; color: #38bdf8;
            font-family: 'Courier New', Courier, monospace; padding: 1rem; font-size: 0.85rem; resize: none; outline: none; line-height: 1.6;
        }
        #txtOutput { color: #34d399; word-break: break-all; }
        .console-box { background-color: #020617; border: 1px solid var(--border-color); border-radius: 0.5rem; padding: 0.75rem 1rem; font-family: monospace; font-size: 0.75rem; max-height: 140px; overflow-y: auto; color: #cbd5e1; }
        .log-item { margin-bottom: 0.2rem; }
        .log-error { color: #f87171; font-weight: bold; }
        .log-success { color: #4ade80; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>難読化装置AsepXyz <span style="font-size: 0.7rem; background: #1e1b4b; border: 1px solid #4338ca; padding: 0.15rem 0.5rem; border-radius: 4px; color: #a5b4fc;">Monolithic Node.js Transformer v6</span></h1>
        <p>JavaScript Transformer - Penyebaran Identitas Terdistribusi Merata untuk Kompatibilitas Node.js Modern</p>
    </header>

    <div class="toolbar">
        <label class="btn btn-file">
            📁 Upload File .js
            <input type="file" id="fileInput" accept=".js">
        </label>
        <button class="btn" id="btnObfuscate">Transform Code ⚡</button>
        <button class="btn btn-success" id="btnDownload" disabled>💾 Download hasil.js</button>
        <button class="btn btn-file" id="btnCopy" disabled>Salin Kode</button>
    </div>

    <div class="workspace">
        <div class="editor-box">
            <div class="editor-label">INPUT JAVASCRIPT (NODE.JS COMPATIBLE)</div>
            <textarea id="txtInput" placeholder="// Masukkan kode Node.js murni di sini...&#10;const fs = require('fs');&#10;&#10;async function prosesData(pathFile, nilaiAwal) {&#10;    try {&#10;        let totalSkor = nilaiAwal + 150;&#10;        for (let i = 0; i < 5; i++) {&#10;            totalSkor += i;&#10;        }&#10;        console.log('Hasil kalkulasi:', totalSkor);&#10;        return totalSkor;&#10;    } catch (errorSistem) {&#10;        console.error(errorSistem);&#10;    }&#10;}&#10;&#10;prosesData('config.json', 10);"></textarea>
        </div>
        <div class="editor-box">
            <div class="editor-label">OUTPUT OBFUSCATED (DISTRIBUTED IDENTIFIER BRANDING)</div>
            <textarea id="txtOutput" readonly placeholder="// Hasil kode terdistribusi merata akan tampil di sini..."></textarea>
        </div>
    </div>

    <div class="console-box" id="divLog">
        <div class="log-item">[System] Engine Siap. Menunggu instruksi...</div>
    </div>
</div>

<script>
    // Kamus Angka Kanji Tradisional Jepang Sesuai Aturan Wajib Kontinuitas
    const KANJI_NUMBERS = ['零', '壱', '弐', '参', '四', '伍', '六', '七', '八', '九', '拾'];

    // Strict Protected Tokens (Dilarang Keras Di-rename demi validitas API Node.js dan Environment runtime)
    const PROTECTED_TOKENS = new Set([
        'const', 'let', 'var', 'if', 'else', 'for', 'while', 'switch', 'case', 'break', 
        'return', 'try', 'catch', 'function', 'class', 'new', 'await', 'async',
        'true', 'false', 'null', 'undefined', 'this', 'typeof', 'instanceof', 'in', 'do',
        'require', 'exports', 'module', 'process', 'Buffer', 'console', 'global', 'globalThis',
        'setTimeout', 'setInterval', 'clearTimeout', 'clearInterval', 'log', 'error', 'info',
        'warn', 'dir', '__dirname', '__filename', 'Object', 'Array', 'String', 'Number', 'Math', 'JSON'
    ]);

    // Generator Sekuensial Berbasis Aturan Penamaan Suffix Bertingkat
    function generateSequentialBrandedName(index) {
        const prefix = '難読化装置AsepXyz';
        if (index < KANJI_NUMBERS.length) {
            return prefix + KANJI_NUMBERS[index];
        }
        
        let suffix = '';
        let num = index;
        while (num > 0) {
            suffix = KANJI_NUMBERS[num % KANJI_NUMBERS.length] + suffix;
            num = Math.floor(num / KANJI_NUMBERS.length);
        }
        return prefix + suffix;
    }

    // Mengonversi Angka Desimal Menjadi Struktur Aljabar Hexadecimal valid: (0xXX + 0xXX)
    function encryptNumberToHexExpression(numStr) {
        const value = parseInt(numStr, 10);
        if (isNaN(value)) return numStr;
        
        // Memecah nilai dasar menjadi dua komponen aljabar acak
        const part1 = Math.floor(value / 2);
        const part2 = value - part1;
        
        return `(0x${part1.toString(16)} + 0x${part2.toString(16)})`;
    }

    // XOR + Hex/Unicode Escape String Generator (Bebas Base64)
    const XOR_KEY = 0x5A; 
    function encryptStringToXorUnicode(str) {
        let output = '';
        for (let i = 0; i < str.length; i++) {
            let xorVal = str.charCodeAt(i) ^ XOR_KEY;
            output += '\\x' + xorVal.toString(16).padStart(2, '0');
        }
        return output;
    }

    function writeLog(text, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const item = document.createElement('div');
        item.className = 'log-item';
        if(type === 'error') item.className += ' log-error';
        if(type === 'success') item.className += ' log-success';
        item.innerText = `[${time}] ${text}`;
        const logBox = document.getElementById('divLog');
        logBox.appendChild(item);
        logBox.scrollTop = logBox.scrollHeight;
    }

    // Event UI
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            document.getElementById('txtInput').value = evt.target.result;
            writeLog(`Berhasil memuat file eksternal: ${file.name}`);
        };
        reader.readAsText(file);
    });

    document.getElementById('btnCopy').addEventListener('click', function() {
        const output = document.getElementById('txtOutput');
        if(!output.value) return;
        output.select();
        document.execCommand('copy');
        writeLog('Kode hasil replikasi monolitik berhasil disalin!', 'success');
    });

    document.getElementById('btnDownload').addEventListener('click', function() {
        const code = document.getElementById('txtOutput').value;
        if(!code) return;
        const blob = new Blob([code], {type: 'application/javascript;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'hasil.js';
        a.click();
        URL.revokeObjectURL(url);
    });

    // =============================================================
    // PROFESSIONAL LEXICAL CONTEXT TRANSFORMER V6
    // =============================================================
    document.getElementById('btnObfuscate').addEventListener('click', function() {
        let code = document.getElementById('txtInput').value.trim();
        if (!code) {
            writeLog('Gagal: Teks input Node.js kosong!', 'error');
            return;
        }

        try {
            writeLog('Melakukan audit sintaksis awal dan stripping komentar...');
            
            // Step 1: Pembersihan Komentar Tanpa Merusak Spasi Baris
            code = code.replace(/\/\*[\s\S]*?\*\//g, ' ');
            code = code.replace(/\/\/.*$/gm, ' ');

            let stringPool = [];
            let stringMap = new Map();
            let stringCounter = 0;

            function registerString(strValue) {
                if (stringMap.has(strValue)) return stringMap.get(strValue);
                stringPool.push(strValue);
                stringMap.set(strValue, stringCounter);
                return stringCounter++;
            }

            // Step 2: Proteksi String Literal (Mencegah salah parsing regex kata di dalam string)
            const stringRegex = /(["'`])((?:\\.|[^\\])*?)\1/g;
            let preparedCode = code.replace(stringRegex, function(match, quote, content) {
                let idx = registerString(content);
                return `___ASEP_STR_LITERAL___[${idx}]`;
            });

            // Step 3: Proteksi Object Properties Dan JSON Keys (.property atau property:)
            // Menandai properti agar tidak terkena rename parser global
            const propertyDotRegex = /\.([a-zA-Z_$][a-zA-Z0-9_$]*)/g;
            preparedCode = preparedCode.replace(propertyDotRegex, function(match, propName) {
                if (PROTECTED_TOKENS.has(propName)) return match;
                let idx = registerString(propName);
                return `[___ASEP_STR_LITERAL___[${idx}]]`;
            });

            const propertyObjectLiteralRegex = /\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*:/g;
            preparedCode = preparedCode.replace(propertyObjectLiteralRegex, function(match, propKey) {
                if (PROTECTED_TOKENS.has(propKey)) return match;
                let idx = registerString(propKey);
                return `[___ASEP_STR_LITERAL___[${idx}]]:`;
            });

            // Step 4: Transformasi Angka Desimal Menjadi Aljabar Hexadecimal Math Expression
            preparedCode = preparedCode.replace(/\b\d+\b/g, function(numMatch) {
                return encryptNumberToHexExpression(numMatch);
            });

            // Step 5: Contextual Scanning - Menemukan Seluruh Identifier Lokal Yang Layak Ubah
            let localRenamingMap = {};
            let globalIdCounter = 0;

            // Memindai pola deklarasi (let, const, var, function, class, catch, arrow, parameter)
            const declarationRules = [
                /\b(?:var|let|const|function|class)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)/g, // Deklarasi Standar
                /,\s*([a-zA-Z_$][a-zA-Z0-9_$]*)\s*(?=[=,;])/g,                      // Multideklarasi koma
                /catch\s*\(\s*([a-zA-Z_$][a-zA-Z0-9_$]*)\s*\)/g,                    // Catch error parameter
                /\bfunction\s*[a-zA-Z_$][a-zA-Z0-9_$]*\s*\(([^)]*)\)/g,             // Parameter fungsi biasa
                /\(([^)]*)\)\s*=>/g,                                                 // Arrow parameter multi
                /\b([a-zA-Z_$][a-zA-Z0-9_$]*)\s*=>/g                                 // Arrow parameter tunggal
            ];

            // Sub-helper ekstraksi parameter fungsi hasil scanning regex
            function extractSubParameters(paramString) {
                let splitTokens = paramString.split(/[\s,{} [\]]+/);
                splitTokens.forEach(function(token) {
                    let cleaned = token.trim();
                    if (cleaned && !PROTECTED_TOKENS.has(cleaned) && /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(cleaned)) {
                        if (!localRenamingMap[cleaned]) {
                            localRenamingMap[cleaned] = generateSequentialBrandedName(globalIdCounter++);
                        }
                    }
                });
            }

            declarationRules.forEach(function(ruleRegex, index) {
                let matchedResult;
                ruleRegex.lastIndex = 0;
                while ((matchedResult = ruleRegex.exec(preparedCode)) !== null) {
                    if (index === 3 || index === 4) {
                        // Memproses parameter di dalam tanda kurung fungsi
                        extractSubParameters(matchedResult[1]);
                    } else {
                        let targetVarName = matchedResult[1];
                        if (targetVarName && !PROTECTED_TOKENS.has(targetVarName) && !targetVarName.startsWith('___ASEP_')) {
                            if (!localRenamingMap[targetVarName]) {
                                localRenamingMap[targetVarName] = generateSequentialBrandedName(globalIdCounter++);
                            }
                        }
                    }
                }
            });

            // Step 6: Eksekusi Rename Secara Merata Di Seluruh Tubuh File Berbasis Word Boundary (\b)
            for (let rawIdentifier in localRenamingMap) {
                let brandedSubstitutionName = localRenamingMap[rawIdentifier];
                let boundaryRegex = new RegExp('\\b' + rawIdentifier + '\\b', 'g');
                preparedCode = preparedCode.replace(boundaryRegex, brandedSubstitutionName);
            }

            // Step 7: Enkripsi String Pool Memakai Jalur Penyandian XOR Byte Terproteksi
            let encryptedPoolArrayContent = stringPool.map(function(rawText) {
                return `"${encryptStringToXorUnicode(rawText)}"`;
            });

            // Step 8: Penyeragaman Global Komponen Helper Internal Memakai Sistem Generator Tunggal Yang Sama
            let masterPoolBrandedName = generateSequentialBrandedName(globalIdCounter++);
            let decoderBrandedName = generateSequentialBrandedName(globalIdCounter++);
            let iteratorBrandedIndex = generateSequentialBrandedName(globalIdCounter++);
            let xorKeyExpressionBranded = `(0x${XOR_KEY.toString(16)})`;

            // Hubungkan penanda string literal ke nama fungsi decoder ter-branding
            preparedCode = preparedCode.replace(/___ASEP_STR_LITERAL___/g, decoderBrandedName);

            // Step 9: Minifikasi Penuh Tanpa Merusak Sintaksis (Menghapus whitespace berlebih)
            preparedCode = preparedCode.replace(/\s+/g, ' ');
            preparedCode = preparedCode.replace(/\s*([=\{\}\(\),;:><\+\-\*\/])\s*/g, '$1');

            // Step 10: Konstruksi Monolitik Runtime Tunggal (Satu Rumpun Keluarga Dari Atas ke Bawah)
            let runtimeEngineBlock = `const ${masterPoolBrandedName}=[${encryptedPoolArrayContent.join(',')}];function ${decoderBrandedName}(${iteratorBrandedIndex}){let _str=${masterPoolBrandedName}[${iteratorBrandedIndex}],_res='',_k=${xorKeyExpressionBranded};for(let i=0;i<_str.length;i++){_res+=String.fromCharCode(_str.charCodeAt(i)^_k);}return _res;}${preparedCode}`;

            // Render Output Ke UI Komponen
            document.getElementById('txtOutput').value = runtimeEngineBlock;
            document.getElementById('btnDownload').disabled = false;
            document.getElementById('btnCopy').disabled = false;

            writeLog(`Sukses Besar! Berhasil memetakan ${Object.keys(localRenamingMap).length} variabel lokal.`, 'success');
            writeLog('Output terdistribusi merata, bersih dari literal kosong, siap dijalankan di Node.js.', 'success');

        } catch (error) {
            writeLog('Fatal Error Transformer: ' + error.message, 'error');
            document.getElementById('txtOutput').value = `/* Terjadi kesalahan dalam pemrosesan leksikal: \n ${error.message} \n*/`;
        }
    });
</script>

</body>
</html>
