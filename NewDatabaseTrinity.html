    <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAZA MODS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
:root {
  --primary: #4361ee;
  --primary-dark: #3a56d4;
  --success: #38c172;
  --danger: #ef4444;
  --dark: #1e293b;
  --light: #f8fafc;
  --gray: #64748b;
  --gray-light: #e2e8f0;
  --white: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: var(--light);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
}

.container {
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.1);
  width: 100%;
  max-width: 420px;
  overflow: hidden;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.header {
  position: relative;
  height: 280px;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://files.catbox.moe/7gfnco.jpg') center/cover;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
  padding: 20px;
}

.profile-pic {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid var(--primary);
  box-shadow: 0 0 0 4px rgba(67,97,238,0.3);
  margin-bottom: 15px;
  object-fit: cover;
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.badge-online {
  background: var(--success);
  color: white;
  padding: 5px 20px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
}

.content {
  padding: 2rem;
}

.title-main {
  text-align: center;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--dark);
  margin-bottom: 5px;
}

.title-sub {
  text-align: center;
  color: var(--gray);
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
}

.input-group {
  position: relative;
  margin-bottom: 1rem;
}

.input-group i {
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray);
}

.input-group input {
  width: 100%;
  padding: 14px 45px;
  border: 2px solid var(--gray-light);
  border-radius: 12px;
  font-size: 0.95rem;
  font-family: 'Poppins';
  transition: all 0.3s;
}

.input-group input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(67,97,238,0.1);
}

.toggle-eye {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gray);
  cursor: pointer;
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  font-family: 'Poppins';
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary {
  background: var(--primary);
  color: white;
  box-shadow: 0 4px 15px rgba(67,97,238,0.3);
}

.btn-primary:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
}

.links {
  margin-top: 1.5rem;
  text-align: center;
}

.links p {
  color: var(--gray);
  font-size: 0.9rem;
  margin-bottom: 1rem;
}

.link-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  text-decoration: none;
  color: var(--dark);
  font-weight: 500;
  border-radius: 10px;
  transition: all 0.3s;
}

.link-item:hover {
  background: var(--light);
}

.link-wa { color: #25D366; }
.link-ch { color: #f56565; }

.hidden { display: none !important; }

.table-wrapper {
  margin-top: 1.5rem;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--gray-light);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: #e0e7ff;
}

thead th {
  padding: 12px;
  text-align: left;
  color: var(--primary);
  font-weight: 600;
  font-size: 0.9rem;
}

tbody td {
  padding: 12px;
  border-top: 1px solid var(--gray-light);
  font-size: 0.9rem;
}

.status-badge {
  background: #d1fae5;
  color: var(--success);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  display: inline-block;
}

@keyframes shake {
 0%, 100% { transform: translateX(0); }
 25% { transform: translateX(-10px); }
 75% { transform: translateX(10px); }
}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div class="container" id="loginPage">
  <div class="header">
    <img src="https://files.catbox.moe/jolozc.jpg" class="profile-pic" alt="RAZA">
    <h1>RAZA MODS</h1>
    <div class="badge-online">ONLINE</div>
  </div>
  
  <div class="content">
    <div class="title-main">🔒 M5 ||</div>
    <div class="title-sub">&lt;/&gt;X7RażàMọ̰ds3xcellent</div>
    
    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Enter your password" required>
        <i class="fas fa-eye toggle-eye" id="togglePass"></i>
      </div>
      
      <button type="submit" class="btn btn-primary" id="loginBtn">
        <i class="fas fa-lock"></i> Login
      </button>
    </form>
    
    <div class="links">
      <p>Belum punya akun?</p>
      <a href="https://wa.me/6283840240138" target="_blank" class="link-item link-wa">
        <i class="fab fa-whatsapp"></i> Beli Sekarang (WhatsApp)
      </a>
      <a href="https://whatsapp.com/channel/0029Vb6KMNq7IUYLgWR6KY0C" target="_blank" class="link-item link-ch">
        <i class="fas fa-volume-up"></i> Saluran Owner (WhatsApp)
      </a>
    </div>
  </div>
</div>

<!-- DASHBOARD PAGE -->
<div class="container hidden" id="dashboardPage">
  <div class="header">
    <img src="https://files.catbox.moe/jolozc.jpg" class="profile-pic" alt="RAZA">
    <h1>RAZA MODS</h1>
    <div class="badge-online">ONLINE</div>
  </div>
  
  <div class="content">
    <div class="title-main">🔒 M5 ||</div>
    <div class="title-sub">&lt;/&gt;X7RażàMọ̰ds3xcellent</div>
    <p style="text-align:center; color:var(--gray); font-size:0.85rem; margin-bottom:1rem;">Add and check your registered numbers</p>
    
    <div class="input-group">
      <input type="text" id="phoneInput" placeholder="Enter phone number">
    </div>
    
    <button class="btn btn-primary" onclick="addNumber()">
      <i class="fas fa-plus"></i> Add Number
    </button>
    
    <div class="input-group" style="margin-top:1rem;">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search numbers..." oninput="searchNumber()">
    </div>
    
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Number</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="numberTable">
          <tr><td colspan="2" style="text-align:center; color:var(--gray);">Klik Add Number untuk load data</td></tr>
        </tbody>
      </table>
    </div>
    
    <button class="btn" style="background:var(--danger); color:white; margin-top:1rem;" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
</div>

<script>
const CONFIG = {
  password: "AsepXTrinityV1",
  owner: "AsepXyz12",
  repo: "bot-wa-db",
  branch: "main",
  databasePath: "database/database.json"
};

const STORAGE_KEY = "raza_session";
let dbData = { Numbers: [] };

function buildRawUrl() {
  return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${CONFIG.databasePath}`;
}

// Init
function init() {
  const session = localStorage.getItem(STORAGE_KEY);
  if (session && JSON.parse(session).password === CONFIG.password) {
    showDashboard();
  } else {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginPage').classList.remove('hidden');
  document.getElementById('dashboardPage').classList.add('hidden');
}

function showDashboard() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('dashboardPage').classList.remove('hidden');
  loadDatabase();
}

// Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('password');
  const btn = document.getElementById('loginBtn');
  
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
  
  await new Promise(r => setTimeout(r, 500));
  
  if (input.value === CONFIG.password) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({password: input.value}));
    Swal.fire({icon:'success', title:'Login berhasil', timer:1000, showConfirmButton:false});
    setTimeout(showDashboard, 800);
  } else {
    document.getElementById('loginPage').style.animation = 'shake 0.4s';
    setTimeout(() => document.getElementById('loginPage').style.animation = '', 400);
    Swal.fire({icon:'error', title:'Password salah', timer:1500, showConfirmButton:false});
    btn.innerHTML = '<i class="fas fa-lock"></i> Login';
    input.value = '';
  }
});

// Toggle password
document.getElementById('togglePass').addEventListener('click', function() {
  const pass = document.getElementById('password');
  pass.type = pass.type === 'password' ? 'text' : 'password';
  this.classList.toggle('fa-eye-slash');
});

// Load database
async function loadDatabase() {
  try {
    const res = await fetch(buildRawUrl() + '?t=' + Date.now());
    if (!res.ok) throw new Error('File not found');
    dbData = await res.json();
    if (!dbData.Numbers) dbData.Numbers = [];
    renderTable(dbData.Numbers);
  } catch {
    dbData = { Numbers: [] };
    renderTable([]);
  }
}

// Render table
function renderTable(numbers) {
  const tbody = document.getElementById('numberTable');
  if (numbers.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:var(--gray);">Belum ada nomor</td></tr>';
    return;
  }
  tbody.innerHTML = numbers.map(num => `
    <tr>
      <td>${num}</td>
      <td><span class="status-badge">active</span></td>
    </tr>
  `).join('');
}

// Add number
async function addNumber() {
  const input = document.getElementById('phoneInput');
  const num = input.value.trim();
  
  if (!num) return Swal.fire({icon:'warning', title:'Masukkan nomor dulu', timer:1500});
  if (dbData.Numbers.includes(num)) return Swal.fire({icon:'info', title:'Nomor sudah ada', timer:1500});
  
  dbData.Numbers.push(num);
  
  // Note: GitHub Pages gabisa write file langsung. Ini cuma update di memory.
  // Kalo mau permanen harus pake GitHub API + token. Tapi lu minta simple jadi gini dulu.
  
  renderTable(dbData.Numbers);
  input.value = '';
  Swal.fire({icon:'success', title:'Nomor ditambahkan!', timer:1000, showConfirmButton:false});
}

// Search
function searchNumber() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const filtered = dbData.Numbers.filter(n => n.toLowerCase().includes(query));
  renderTable(filtered);
}

// Logout
function logout() {
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('password').value = '';
  showLogin();
}

init();
</script>
</body>
</html>
